name: PR Validate

on:
  pull_request:
    paths:
      - 'src/**'
      - 'public/**'
      - 'assets/**'
      - 'tests/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'build.mjs'
      - 'playwright.config.ts'
      - 'tsconfig.json'
      - 'tsconfig.test.json'
      - 'eslint.config.mjs'
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  pr-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Validate project (lint, typecheck, unit tests, build)
        run: pnpm run validate

      - name: Coverage
        run: pnpm run test:coverage

      - name: Semgrep
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            semgrep/semgrep:1.166.0 \
            semgrep scan \
            --config=p/javascript \
            --config=p/security-audit \
            --error \
            --quiet

      - name: Permissions audit
        run: |
          node --input-type=module <<'EOF'
          import { readFileSync } from 'fs';
          const manifest = JSON.parse(
            readFileSync('assets/manifest.json', 'utf8')
          );
          // optional_host_permissions is deliberately excluded — broad origins
          // are permitted there because the user must explicitly grant them at
          // runtime.
          const perms = [
            ...(manifest.permissions ?? []),
            ...(manifest.host_permissions ?? []),
          ];
          const broad = perms.filter(
            p => p === '<all_urls>' || p === '*://*/*' || p === 'https://*/*'
          );
          if (broad.length > 0) {
            console.error('Broad permissions detected:', broad);
            process.exit(1);
          }
          console.log('Permissions OK:', perms.join(', '));
          EOF

      - name: Install Playwright browsers
        run: ./node_modules/.bin/playwright install --with-deps chromium

      - name: Run integration tests (Playwright)
        run: ./node_modules/.bin/playwright test --config=playwright.config.ts --project=integration-chromium --reporter=line

      - name: Run E2E tests (Playwright)
        run: ./node_modules/.bin/playwright test --config=playwright.config.ts --project=e2e-chromium --reporter=line
