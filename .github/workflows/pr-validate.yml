name: PR Validate

on:
  pull_request:
    paths:
      - 'src/**'
      - 'public/**'
      - 'assets/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - 'build.mjs'
      - 'playwright.config.ts'
      - 'tsconfig.json'
      - 'tsconfig.test.json'
      - 'eslint.config.mjs'
      - '.github/workflows/**'

jobs:
  pr-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate project (lint, typecheck, unit tests, build)
        run: npm run validate

      - name: Coverage
        run: npm run test:coverage

      - name: Semgrep
        run: |
          pip install semgrep --quiet
          semgrep scan \
            --config=p/javascript \
            --config=p/security-audit \
            --error \
            --quiet

      - name: Permissions audit
        run: |
          node --input-type=module <<'EOF'
          import { readFileSync } from 'fs';
          const manifest = JSON.parse(
            readFileSync('assets/manifest.json', 'utf8')
          );
          const perms = [
            ...(manifest.permissions ?? []),
            ...(manifest.host_permissions ?? []),
          ];
          const broad = perms.filter(
            p => p === '<all_urls>' || p === '*://*/*' || p === 'https://*/*'
          );
          if (broad.length > 0) {
            console.error('Broad permissions detected:', broad);
            process.exit(1);
          }
          console.log('Permissions OK:', perms.join(', '));
          EOF

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run integration tests (Playwright)
        run: npx playwright test tests/integration --project=chromium --reporter=line
