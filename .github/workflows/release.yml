name: Build and Release Extension

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'assets/**'
      - 'tests/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'build.mjs'
      - 'playwright.config.ts'
      - 'tsconfig.json'
      - 'tsconfig.test.json'
      - 'eslint.config.mjs'
      - '.github/workflows/**'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Validate project (lint, typecheck, unit tests, build)
        run: pnpm run validate

      - name: Install Playwright browsers
        run: ./node_modules/.bin/playwright install --with-deps chromium

      - name: Run integration tests (Playwright)
        run: ./node_modules/.bin/playwright test --config=playwright.config.ts --project=integration-chromium --reporter=line

      - name: Run E2E tests (Playwright)
        run: ./node_modules/.bin/playwright test --config=playwright.config.ts --project=e2e-chromium --reporter=line

      # Rebuild dist/ with the GA4 telemetry credentials baked in. This runs
      # only here — after every test phase — so the credential-free build is
      # what lint/unit/integration/e2e tests exercise (the extension fires no
      # real telemetry during CI). Only the artifact that gets zipped and
      # released below carries the credentials.
      - name: Build with telemetry credentials
        run: pnpm run build
        env:
          GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID }}
          GA_API_SECRET: ${{ secrets.GA_API_SECRET }}

      - name: Get version from manifest
        id: manifest
        run: |
          VERSION=$(jq -r .version dist/manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Archive dist folder
        run: zip -r psp-detector-${{ steps.manifest.outputs.version }}.zip dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v2 (v2.5.0)
        with:
          tag_name: ${{ steps.manifest.outputs.version }}
          name: psp-detector-${{ steps.manifest.outputs.version }}.zip
          body: 'Automated build and release.'
          files: psp-detector-${{ steps.manifest.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
