name: Build and Release Extension

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'assets/**'
      - 'tests/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'build.mjs'
      - 'playwright.config.ts'
      - 'tsconfig.json'
      - 'tsconfig.test.json'
      - 'eslint.config.mjs'
      - '.github/workflows/**'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Validate project (lint, typecheck, unit tests, build)
        run: pnpm run validate

      - name: Install Playwright browsers
        run: ./node_modules/.bin/playwright install --with-deps chromium

      - name: Run integration tests (Playwright)
        run: ./node_modules/.bin/playwright test --config=playwright.config.ts --project=integration-chromium --reporter=line

      - name: Run E2E tests (Playwright)
        run: ./node_modules/.bin/playwright test --config=playwright.config.ts --project=e2e-chromium --reporter=line

      - name: Get version from manifest
        id: manifest
        run: |
          VERSION=$(jq -r .version dist/manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Archive dist folder
        run: zip -r psp-detector-${{ steps.manifest.outputs.version }}.zip dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2 (v2.5.0)
        with:
          tag_name: ${{ steps.manifest.outputs.version }}
          name: psp-detector-${{ steps.manifest.outputs.version }}.zip
          body: 'Automated build and release.'
          files: psp-detector-${{ steps.manifest.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
