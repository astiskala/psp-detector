name: Rebase dependabot PRs

# After each push to main (typically a merged PR), rebase all open dependabot
# PRs so their branches stay current. This prevents pnpm lockfile conflicts
# in GitHub's simulated merge commit, which cause ERR_PNPM_BROKEN_LOCKFILE
# failures in CI even when the individual branch is clean.

on:
  push:
    branches: [main]

permissions:
  pull-requests: write

jobs:
  rebase:
    runs-on: ubuntu-latest
    steps:
      - name: Rebase open dependabot PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          prs=$(gh pr list \
            --repo "$REPO" \
            --author "dependabot[bot]" \
            --state open \
            --json number \
            --jq '.[].number')

          if [ -z "$prs" ]; then
            echo "No open dependabot PRs to rebase."
            exit 0
          fi

          for pr in $prs; do
            echo "Rebasing PR #$pr..."
            gh pr comment "$pr" --repo "$REPO" --body "@dependabot rebase"
          done
