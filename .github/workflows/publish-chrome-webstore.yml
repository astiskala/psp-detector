name: Publish to Chrome Web Store

# On-demand publishing only. Auto-publishing on every push to main was
# removed: the Chrome Web Store rejects a new submission while a previous
# one is still in review, so frequent pushes piled up as failed publishes.
# Run this workflow yourself when you actually want to submit a build to
# Trusted Testers (see README → Development → Publishing to the Chrome Web Store).
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (leave blank to use the latest release)'
        required: false
        type: string

jobs:
  publish:
    name: Publish to Trusted Testers
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Resolve release tag
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          TAG="$INPUT_TAG"

          # No tag supplied: default to the most recently published release.
          if [ -z "$TAG" ]; then
            TAG=$(gh release list \
              --repo "${{ github.repository }}" \
              --limit 1 \
              --json tagName \
              --jq '.[0].tagName')
          fi

          if [ -z "$TAG" ]; then
            echo "Error: could not resolve a release tag to publish"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing tag: $TAG"

      - name: Download release ZIP
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          set -euo pipefail
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern "psp-detector-$TAG.zip"

          if [ ! -f "psp-detector-$TAG.zip" ]; then
            echo "Error: psp-detector-$TAG.zip not found for tag '$TAG'"
            ls -la
            exit 1
          fi
          echo "Downloaded psp-detector-$TAG.zip"

      - name: Upload and publish to Trusted Testers
        uses: furkanipek/chrome-extension-action@7b8043da23667cbbf606ad7b075faa23fd16d09f # v1.0.1
        with:
          refresh-token: ${{ secrets.CWS_REFRESH_TOKEN }}
          extension-id: ${{ secrets.CWS_EXTENSION_ID }}
          client-id: ${{ secrets.CWS_CLIENT_ID }}
          client-secret: ${{ secrets.CWS_CLIENT_SECRET }}
          extension-file: psp-detector-${{ steps.resolve.outputs.tag }}.zip
          publish: 'true'
          tester: 'true'
