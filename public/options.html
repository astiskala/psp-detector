<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PSP Detector - History</title>
  <link rel="stylesheet" href="common.css" />
  <style>
    .header-actions {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .field-control {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 13px;
      min-height: 38px;
      padding: 10px 12px;
    }

    .search-control {
      flex: 1;
      min-width: 200px;
    }

    .chart-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }

    .chart-card {
      padding: 12px;
    }

    .chart-card h2 {
      font-size: 14px;
      margin: 0 0 8px;
    }

    .chart-canvas-wrap {
      align-items: center;
      display: flex;
      justify-content: center;
      margin-bottom: 10px;
    }

    .chart-canvas-wrap canvas {
      height: 200px;
      max-width: 200px;
      width: 200px;
    }

    .chart-legend {
      display: grid;
      gap: 6px;
      list-style: none;
      margin: 0;
      max-height: 120px;
      overflow: auto;
      padding: 0;
    }

    .chart-legend-item {
      align-items: center;
      color: var(--text-secondary);
      display: flex;
      font-size: 12px;
      gap: 8px;
      line-height: 1.3;
    }

    .legend-swatch {
      border-radius: 999px;
      display: inline-block;
      flex: 0 0 auto;
      height: 10px;
      width: 10px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      border-collapse: collapse;
      font-size: 13px;
      width: 100%;
    }

    th {
      border-bottom: 2px solid var(--border);
      color: var(--text-secondary);
      font-weight: 700;
      padding: 8px 12px;
      text-align: left;
      white-space: nowrap;
    }

    td {
      border-bottom: 1px solid var(--border);
      padding: 8px 12px;
      vertical-align: top;
    }

    .table-cell-with-icon {
      align-items: center;
      display: flex;
      gap: 8px;
      min-width: 0;
    }

    .table-icon {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      flex: 0 0 auto;
      height: 16px;
      object-fit: cover;
      width: 16px;
    }

    .psp-icon {
      object-fit: contain;
      padding: 1px;
    }

    .psp-list {
      display: grid;
      gap: 6px;
    }

    .psp-item {
      align-items: center;
      display: flex;
      gap: 8px;
      min-width: 0;
    }

    .cell-label {
      overflow-wrap: anywhere;
    }

    tr:hover td {
      background: var(--surface);
    }

    code {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text-secondary);
      display: inline-block;
      font-size: 11px;
      margin-bottom: 4px;
      padding: 2px 6px;
      white-space: nowrap;
    }

    code:last-child {
      margin-bottom: 0;
    }

    .empty {
      color: var(--text-secondary);
      padding: 48px;
      text-align: center;
    }

    @media (max-width: 800px) {
      .header-actions {
        justify-content: flex-start;
        width: 100%;
      }

      .search-control {
        min-width: 0;
      }
    }
  </style>
</head>

<body class="app-page">
  <header class="page-header">
    <div class="brand-wrap">
      <img class="brand-logo" src="images/default_48.png" alt="PSP Detector logo" />
      <div>
        <h1 class="page-title">PSP Detector - History</h1>
        <p class="page-subtitle" id="stats">Loading...</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn btn-secondary" id="exportBtn">Export CSV</button>
      <button class="btn btn-danger" id="clearBtn">Clear History</button>
    </div>
  </header>

  <main class="page-content">
    <div class="controls">
      <input
        type="search"
        id="search"
        class="field-control search-control"
        placeholder="Search domains, PSPs, or detection signals..."
        autocomplete="off"
      />
      <select id="pspFilter" class="field-control">
        <option value="">All PSPs</option>
      </select>
    </div>

    <section class="chart-grid" aria-label="Detection breakdown charts">
      <article class="chart-card surface-card">
        <h2>Detected PSPs</h2>
        <div class="chart-canvas-wrap">
          <canvas id="pspChart" width="200" height="200" aria-label="PSP share chart"></canvas>
        </div>
        <ul id="pspChartLegend" class="chart-legend"></ul>
      </article>
      <article class="chart-card surface-card">
        <h2>Detection Source</h2>
        <div class="chart-canvas-wrap">
          <canvas id="sourceChart" width="200" height="200" aria-label="Detection source share chart"></canvas>
        </div>
        <ul id="sourceChartLegend" class="chart-legend"></ul>
      </article>
      <article class="chart-card surface-card">
        <h2>Provider Type</h2>
        <div class="chart-canvas-wrap">
          <canvas id="typeChart" width="200" height="200" aria-label="Provider type share chart"></canvas>
        </div>
        <ul id="typeChartLegend" class="chart-legend"></ul>
      </article>
    </section>

    <div class="table-wrap surface-card">
      <table>
        <thead>
          <tr>
            <th>Date / Time</th>
            <th>Domain</th>
            <th>PSP(s)</th>
            <th>Type</th>
            <th>Detection Source</th>
            <th>Detection Signal</th>
          </tr>
        </thead>
        <tbody id="historyBody"></tbody>
      </table>
      <p class="empty" id="emptyState" hidden>No history yet.</p>
    </div>
  </main>

  <script src="options.js"></script>
</body>

</html>
